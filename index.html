<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clock (JST / UTC / UnixTime)</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Consolas", "Courier New", monospace;
      background:
        radial-gradient(circle at 50% 50%, #0d1a0d 0%, #050805 62%, #020302 100%);
      color: #8dff9c;
      text-shadow: 0 0 8px rgba(80, 255, 120, 0.35);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(110, 255, 140, 0.08) 0px,
        rgba(110, 255, 140, 0.08) 1px,
        transparent 2px,
        transparent 4px
      );
      opacity: 0.25;
    }

    main {
      min-height: 100dvh;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    .row {
      background: linear-gradient(180deg, rgba(10, 28, 12, 0.9), rgba(4, 16, 6, 0.95));
      border: 1px solid rgba(92, 255, 128, 0.35);
      border-radius: 8px;
      box-shadow:
        inset 0 0 24px rgba(54, 240, 90, 0.12),
        0 0 24px rgba(40, 220, 90, 0.12);
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .label {
      color: #61ff84;
      font-size: clamp(1.6rem, 2.8vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .value {
      color: #b4ffbe;
      font-size: clamp(2.4rem, 6.2vw, 5.2rem);
      font-weight: 700;
      line-height: 1.3;
      white-space: pre-line;
      word-break: break-word;
      text-shadow:
        0 0 8px rgba(120, 255, 150, 0.5),
        0 0 18px rgba(120, 255, 150, 0.25);
      animation: flicker 2.6s infinite;
    }

    .weather {
      grid-column: 2;
      grid-row: 1 / 4;
      justify-content: flex-start;
      gap: 14px;
    }

    .redmine {
      grid-column: 3;
      grid-row: 1 / 4;
      justify-content: flex-start;
      gap: 14px;
    }

    .weather .value {
      font-size: clamp(1.9rem, 3.4vw, 3.2rem);
    }

    .zip-config {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .zip-config label {
      font-size: clamp(1rem, 1.2vw, 1.2rem);
      color: #9dffad;
    }

    .zip-config input {
      width: 130px;
      padding: 6px 8px;
      border: 1px solid rgba(92, 255, 128, 0.45);
      border-radius: 4px;
      background: rgba(2, 8, 2, 0.9);
      color: #b4ffbe;
      font-family: inherit;
      font-size: 1rem;
    }

    .zip-config button {
      padding: 6px 10px;
      border: 1px solid rgba(92, 255, 128, 0.45);
      border-radius: 4px;
      background: rgba(12, 40, 16, 0.9);
      color: #b4ffbe;
      font-family: inherit;
      cursor: pointer;
    }

    .zip-config button:hover {
      background: rgba(22, 58, 25, 0.95);
    }

    .zip-status {
      min-height: 1.2em;
      font-size: 0.95rem;
      color: #9dffad;
    }

    .forecast {
      margin-top: 4px;
      display: grid;
      gap: 6px;
      font-size: clamp(1.1rem, 1.6vw, 1.4rem);
      line-height: 1.35;
      color: #9dffad;
      text-shadow: 0 0 6px rgba(120, 255, 150, 0.22);
    }

    .forecast-row {
      display: grid;
      grid-template-columns: 1.5fr 1.5fr 1fr;
      gap: 8px;
      align-items: baseline;
    }

    .forecast-row span:last-child {
      text-align: right;
    }

    .sub-label {
      color: #61ff84;
      font-size: clamp(1.2rem, 2vw, 1.7rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px solid rgba(92, 255, 128, 0.25);
    }

    .redmine-config {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .redmine-config label {
      font-size: 0.95rem;
      color: #9dffad;
    }

    .redmine-config input,
    .redmine-config select,
    .redmine-config button {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid rgba(92, 255, 128, 0.45);
      border-radius: 4px;
      background: rgba(2, 8, 2, 0.9);
      color: #b4ffbe;
      font-family: inherit;
      font-size: 0.95rem;
    }

    .redmine-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .redmine-status,
    .redmine-summary {
      min-height: 1.2em;
      font-size: 0.9rem;
      color: #9dffad;
    }

    .ticket-list {
      display: grid;
      gap: 6px;
      font-size: 0.95rem;
      max-height: 40dvh;
      overflow: auto;
      padding-right: 4px;
    }

    .ticket-row {
      display: grid;
      gap: 2px;
      border: 1px solid rgba(92, 255, 128, 0.2);
      border-radius: 4px;
      padding: 6px 8px;
      color: #b4ffbe;
      text-decoration: none;
      background: rgba(8, 20, 9, 0.7);
    }

    .ticket-row:hover {
      background: rgba(15, 32, 16, 0.9);
    }

    .ticket-row-meta {
      color: #9dffad;
      font-size: 0.85rem;
    }

    .ticket-row.is-overdue {
      border-color: rgba(255, 104, 104, 0.8);
      color: #ffd0d0;
    }

    .ticket-row.is-due-today {
      border-color: rgba(240, 206, 70, 0.8);
      color: #fff1b2;
    }

    .ticket-row.is-closed {
      opacity: 0.6;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
      }

      .weather {
        grid-column: auto;
        grid-row: auto;
      }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      48% { opacity: 0.92; }
      50% { opacity: 0.86; }
      52% { opacity: 0.96; }
    }
  </style>
</head>
<body>
  <main>
    <section class="row"><div class="label">日本時間 (JST)</div><div id="jst" class="value">-</div></section>
    <section class="row"><div class="label">UTC</div><div id="utc" class="value">-</div></section>
    <section class="row"><div class="label">UnixTime</div><div id="unix" class="value">-</div></section>
    <section class="row weather">
      <div id="weatherTitle" class="label">神田駅周辺の天気</div>
      <form id="zipForm" class="zip-config">
        <label for="zipInput">郵便番号</label>
        <input id="zipInput" name="zip" type="text" inputmode="numeric" placeholder="1010044" maxlength="8" pattern="\d{3}-?\d{4}" />
        <button type="submit">設定</button>
        <button type="button" id="zipReset">初期値に戻す</button>
      </form>
      <div id="zipStatus" class="zip-status"></div>
      <div id="weatherCurrent" class="value">取得中...</div>
      <div id="forecast" class="forecast">週間予報を取得中...</div>

    </section>
    <section class="row redmine">
      <div class="label">Redmineチケット</div>
      <form id="redmineForm" class="redmine-config">
        <label for="redmineBaseUrl">Redmine URL</label>
        <input id="redmineBaseUrl" type="url" placeholder="https://redmine.example.com" />

        <label for="redmineApiKey">APIキー</label>
        <input id="redmineApiKey" type="password" placeholder="xxxxxxxxxxxxxxxx" autocomplete="off" />

        <label for="redmineTarget">取得対象</label>
        <select id="redmineTarget">
          <option value="assigned">担当チケット</option>
          <option value="authored">起票チケット</option>
        </select>

        <label>
          <input id="redmineHideClosed" type="checkbox" checked />
          終了扱いのチケットを非表示にする
        </label>

        <div class="redmine-actions">
          <button type="submit">保存して取得</button>
          <button type="button" id="redmineRefresh">再取得</button>
          <button type="button" id="redmineReset">クリア</button>
        </div>
      </form>
      <div id="redmineStatus" class="redmine-status">未設定</div>
      <div id="redmineSummary" class="redmine-summary"></div>
      <div id="redmineList" class="ticket-list">設定するとチケット一覧を表示します。</div>
    </section>
  </main>

  <script>
    const DEFAULT_LOCATION = {
      label: '神田駅周辺',
      latitude: 35.6917,
      longitude: 139.7709,
      zip: ''
    };
    const ZIP_STORAGE_KEY = 'clock_weather_zip';
    const REDMINE_BASE_URL_KEY = 'clock_redmine_base_url';
    const REDMINE_API_KEY = 'clock_redmine_api_key';
    const REDMINE_TARGET_KEY = 'clock_redmine_target';
    const REDMINE_HIDE_CLOSED_KEY = 'clock_redmine_hide_closed';

    function weatherCodeToJa(code) {
      const map = {
        0: '快晴',
        1: '晴れ',
        2: '一部くもり',
        3: 'くもり',
        45: '霧',
        48: '着氷性の霧',
        51: '弱い霧雨',
        53: '霧雨',
        55: '強い霧雨',
        56: '弱い着氷性霧雨',
        57: '強い着氷性霧雨',
        61: '弱い雨',
        63: '雨',
        65: '強い雨',
        66: '弱い着氷性の雨',
        67: '強い着氷性の雨',
        71: '弱い雪',
        73: '雪',
        75: '強い雪',
        77: '雪粒',
        80: '弱いにわか雨',
        81: 'にわか雨',
        82: '強いにわか雨',
        85: '弱いにわか雪',
        86: '強いにわか雪',
        95: '雷雨',
        96: '弱いひょうを伴う雷雨',
        99: '強いひょうを伴う雷雨'
      };
      return map[code] || `不明 (code: ${code})`;
    }

    function normalizeZip(rawZip) {
      return rawZip.replace(/[^\d]/g, '').slice(0, 7);
    }

    function buildWeatherUrl(latitude, longitude) {
      const params = new URLSearchParams({
        latitude: String(latitude),
        longitude: String(longitude),
        current: 'temperature_2m,apparent_temperature,weather_code,wind_speed_10m',
        daily: 'weather_code,temperature_2m_max,temperature_2m_min',
        timezone: 'Asia/Tokyo',
        forecast_days: '7'
      });
      return `https://api.open-meteo.com/v1/forecast?${params.toString()}`;
    }

    function normalizeBaseUrl(rawUrl) {
      return String(rawUrl || '').trim().replace(/\/+$/, '');
    }

    function getJstYmd() {
      return new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Tokyo' });
    }

    function buildRedmineIssuesUrl(baseUrl, target, limit, offset) {
      const params = new URLSearchParams({
        status_id: '*',
        sort: 'due_date:asc,priority:desc,id:desc',
        limit: String(limit),
        offset: String(offset)
      });
      params.set(target === 'authored' ? 'author_id' : 'assigned_to_id', 'me');
      return `${baseUrl}/issues.json?${params.toString()}`;
    }

    async function fetchRedmineIssues(baseUrl, apiKey, target) {
      const pageSize = 100;
      let offset = 0;
      let totalCount = null;
      const issues = [];

      while (totalCount === null || offset < totalCount) {
        const response = await fetch(buildRedmineIssuesUrl(baseUrl, target, pageSize, offset), {
          cache: 'no-store',
          headers: {
            'X-Redmine-API-Key': apiKey
          }
        });
        if (!response.ok) {
          const error = new Error(`HTTP ${response.status}`);
          error.status = response.status;
          throw error;
        }

        const data = await response.json();
        const pageIssues = Array.isArray(data.issues) ? data.issues : [];
        issues.push(...pageIssues);

        totalCount = Number.isFinite(data.total_count) ? data.total_count : issues.length;
        if (!pageIssues.length) break;
        offset += pageIssues.length;
      }

      return { issues, total_count: totalCount ?? issues.length };
    }

    function redmineIssueUrl(baseUrl, issueId) {
      return `${baseUrl}/issues/${issueId}`;
    }

    function isClosedLikeStatus(statusName) {
      return /closed|resolved|完了|終了/i.test(statusName);
    }

    function renderRedmineIssues(baseUrl, issues, totalCount) {
      const listEl = document.getElementById('redmineList');
      const summaryEl = document.getElementById('redmineSummary');
      const today = getJstYmd();
      const hideClosed = document.getElementById('redmineHideClosed').checked;
      const sortedIssues = [...issues].sort((a, b) => {
        const dueA = a.due_date || '9999-12-31';
        const dueB = b.due_date || '9999-12-31';
        if (dueA !== dueB) return dueA.localeCompare(dueB);

        const priorityA = Number(a.priority?.id || 0);
        const priorityB = Number(b.priority?.id || 0);
        if (priorityA !== priorityB) return priorityB - priorityA;

        return b.id - a.id;
      });

      const visibleIssues = hideClosed
        ? sortedIssues.filter((issue) => !isClosedLikeStatus(issue.status?.name || ''))
        : sortedIssues;

      const overdueCount = visibleIssues.filter((issue) => issue.due_date && issue.due_date < today).length;
      const dueTodayCount = visibleIssues.filter((issue) => issue.due_date === today).length;

      summaryEl.textContent = `表示 ${visibleIssues.length} / 総件数 ${totalCount} / 期限切れ ${overdueCount} / 本日期限 ${dueTodayCount}`;

      if (!visibleIssues.length) {
        listEl.textContent = '表示対象のチケットはありません。';
        return;
      }

      const fragment = document.createDocumentFragment();
      visibleIssues.forEach((issue) => {
        const row = document.createElement('a');
        row.className = 'ticket-row';
        row.target = '_blank';
        row.rel = 'noopener noreferrer';
        row.href = redmineIssueUrl(baseUrl, issue.id);

        const statusName = issue.status?.name || '-';
        const dueDate = issue.due_date || '-';
        if (issue.due_date && issue.due_date < today) row.classList.add('is-overdue');
        else if (issue.due_date === today) row.classList.add('is-due-today');
        if (isClosedLikeStatus(statusName)) row.classList.add('is-closed');

        const title = document.createElement('div');
        title.textContent = `#${issue.id} ${issue.subject}`;
        const meta = document.createElement('div');
        meta.className = 'ticket-row-meta';
        meta.textContent = `${issue.project?.name || '-'} / ${statusName} / ${issue.priority?.name || '-'} / 期日 ${dueDate}`;

        row.append(title, meta);
        fragment.appendChild(row);
      });

      listEl.replaceChildren(fragment);
    }

    function loadRedmineSettings() {
      return {
        baseUrl: normalizeBaseUrl(localStorage.getItem(REDMINE_BASE_URL_KEY) || ''),
        apiKey: String(localStorage.getItem(REDMINE_API_KEY) || ''),
        target: localStorage.getItem(REDMINE_TARGET_KEY) || 'assigned',
        hideClosed: localStorage.getItem(REDMINE_HIDE_CLOSED_KEY) !== 'false'
      };
    }

    function saveRedmineSettings(baseUrl, apiKey, target, hideClosed) {
      localStorage.setItem(REDMINE_BASE_URL_KEY, baseUrl);
      localStorage.setItem(REDMINE_API_KEY, apiKey);
      localStorage.setItem(REDMINE_TARGET_KEY, target);
      localStorage.setItem(REDMINE_HIDE_CLOSED_KEY, String(hideClosed));
    }

    function setRedmineForm(settings) {
      document.getElementById('redmineBaseUrl').value = settings.baseUrl;
      document.getElementById('redmineApiKey').value = settings.apiKey;
      document.getElementById('redmineTarget').value = settings.target;
      document.getElementById('redmineHideClosed').checked = settings.hideClosed;
    }

    function mapRedmineError(error) {
      if (error?.status === 401 || error?.status === 403) return '認証に失敗しました（APIキーを確認してください）';
      if (error?.status === 404) return 'Redmine API endpoint が見つかりません';
      if (String(error?.message || '').startsWith('HTTP')) return `Redmine APIエラー ${error.message}`;
      if (error instanceof TypeError) return 'CORS設定によりブラウザからアクセスできない可能性があります';
      return `取得に失敗: ${String(error?.message || error)}`;
    }

    async function updateRedmineTickets() {
      const statusEl = document.getElementById('redmineStatus');
      const listEl = document.getElementById('redmineList');
      const settings = {
        baseUrl: normalizeBaseUrl(document.getElementById('redmineBaseUrl').value),
        apiKey: String(document.getElementById('redmineApiKey').value || '').trim(),
        target: document.getElementById('redmineTarget').value === 'authored' ? 'authored' : 'assigned'
      };

      if (!settings.baseUrl) {
        statusEl.textContent = 'Redmine URLを入力してください。';
        return;
      }
      if (!settings.apiKey) {
        statusEl.textContent = 'APIキーを入力してください。';
        return;
      }

      statusEl.textContent = 'Redmineチケットを取得中...';
      try {
        const data = await fetchRedmineIssues(settings.baseUrl, settings.apiKey, settings.target);
        const issues = Array.isArray(data.issues) ? data.issues : [];
        renderRedmineIssues(settings.baseUrl, issues, data.total_count || issues.length);
        const now = new Date().toLocaleTimeString('ja-JP', { hour12: false });
        statusEl.textContent = `更新完了 ${now}`;
      } catch (error) {
        statusEl.textContent = mapRedmineError(error);
        if (!listEl.childElementCount) {
          listEl.textContent = 'チケットを表示できませんでした。';
        }
      }
    }

    async function resolveLocationByZip(zip) {
      const response = await fetch(`https://geoapi.heartrails.com/api/json?method=searchByPostal&postal=${zip}`, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`郵便番号検索APIエラー HTTP ${response.status}`);
      }
      const data = await response.json();
      const location = data?.response?.location?.[0];
      if (!location || !location.x || !location.y) {
        throw new Error('郵便番号から位置情報を取得できませんでした');
      }
      const label = [location.prefecture, location.city, location.town].filter(Boolean).join('');
      return {
        label: label || `〒${zip}`,
        latitude: Number(location.y),
        longitude: Number(location.x),
        zip
      };
    }

    async function fetchWeather(location) {
      const response = await fetch(buildWeatherUrl(location.latitude, location.longitude), { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      return response.json();
    }

    function updateWeatherTitle(location) {
      document.getElementById('weatherTitle').textContent = `${location.label}の天気`;
    }

    function renderWeather(data) {
      const weatherCurrentEl = document.getElementById('weatherCurrent');
      const forecastEl = document.getElementById('forecast');
      const current = data.current;
      const daily = data.daily;
      const weatherText = weatherCodeToJa(current.weather_code);
      weatherCurrentEl.textContent =
        `${weatherText}\n` +
        `${current.temperature_2m}°C (体感 ${current.apparent_temperature}°C)\n` +
        `風速 ${current.wind_speed_10m} km/h`;

      const rows = daily.time.map((ymd, index) => {
        const [y, m, d] = ymd.split('-').map(Number);
        const date = new Date(y, m - 1, d);
        const dateLabel = new Intl.DateTimeFormat('ja-JP', {
          month: '2-digit',
          day: '2-digit',
          weekday: 'short'
        }).format(date);
        const dayWeather = weatherCodeToJa(daily.weather_code[index]);
        const max = Math.round(daily.temperature_2m_max[index]);
        const min = Math.round(daily.temperature_2m_min[index]);
        return { dateLabel, dayWeather, tempLabel: `${max} / ${min}°C` };
      });

      const fragment = document.createDocumentFragment();
      rows.forEach((row) => {
        const line = document.createElement('div');
        line.className = 'forecast-row';

        const dateSpan = document.createElement('span');
        dateSpan.textContent = row.dateLabel;
        const weatherSpan = document.createElement('span');
        weatherSpan.textContent = row.dayWeather;
        const tempSpan = document.createElement('span');
        tempSpan.textContent = row.tempLabel;

        line.append(dateSpan, weatherSpan, tempSpan);
        fragment.appendChild(line);
      });
      forecastEl.replaceChildren(fragment);
    }

    let currentLocation = { ...DEFAULT_LOCATION };

    async function updateWeather() {
      const weatherCurrentEl = document.getElementById('weatherCurrent');
      const forecastEl = document.getElementById('forecast');
      try {
        const data = await fetchWeather(currentLocation);
        renderWeather(data);
      } catch (error) {
        weatherCurrentEl.textContent = `天気の取得に失敗\n${String(error.message || error)}`;
        forecastEl.textContent = '週間予報の取得に失敗';
      }
    }

    async function applyZipSetting(rawZip) {
      const zipStatusEl = document.getElementById('zipStatus');
      const zip = normalizeZip(rawZip);
      if (!zip) {
        localStorage.removeItem(ZIP_STORAGE_KEY);
        currentLocation = { ...DEFAULT_LOCATION };
        updateWeatherTitle(currentLocation);
        zipStatusEl.textContent = '初期地点（神田駅周辺）を使用します。';
        await updateWeather();
        return;
      }
      if (!/^\d{7}$/.test(zip)) {
        zipStatusEl.textContent = '郵便番号は7桁で入力してください。';
        return;
      }
      zipStatusEl.textContent = '郵便番号から地点を検索中...';
      try {
        const location = await resolveLocationByZip(zip);
        currentLocation = location;
        localStorage.setItem(ZIP_STORAGE_KEY, zip);
        updateWeatherTitle(currentLocation);
        zipStatusEl.textContent = `〒${zip} (${location.label}) を保存しました。`;
        await updateWeather();
      } catch (error) {
        zipStatusEl.textContent = `設定に失敗しました: ${String(error.message || error)}`;
      }
    }

    function updateClock() {
      const now = new Date();
      const jstDate = now.toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo' });
      const jstTime = now.toLocaleTimeString('ja-JP', {
        timeZone: 'Asia/Tokyo',
        hour12: false
      });
      const utcIso = now.toISOString();
      const utcDate = utcIso.slice(0, 10);
      const utcTime = utcIso.slice(11, 19) + ' UTC';

      document.getElementById('jst').textContent = `${jstDate}\n${jstTime}`;
      document.getElementById('utc').textContent = `${utcDate}\n${utcTime}`;
      document.getElementById('unix').textContent = Math.floor(now.getTime() / 1000).toString();
    }

    document.getElementById('zipForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      await applyZipSetting(document.getElementById('zipInput').value);
    });

    document.getElementById('zipReset').addEventListener('click', async () => {
      document.getElementById('zipInput').value = '';
      await applyZipSetting('');
    });

    document.getElementById('redmineForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const settings = {
        baseUrl: normalizeBaseUrl(document.getElementById('redmineBaseUrl').value),
        apiKey: String(document.getElementById('redmineApiKey').value || '').trim(),
        target: document.getElementById('redmineTarget').value === 'authored' ? 'authored' : 'assigned',
        hideClosed: document.getElementById('redmineHideClosed').checked
      };
      saveRedmineSettings(settings.baseUrl, settings.apiKey, settings.target, settings.hideClosed);
      await updateRedmineTickets();
    });

    document.getElementById('redmineRefresh').addEventListener('click', async () => {
      await updateRedmineTickets();
    });


    document.getElementById('redmineHideClosed').addEventListener('change', () => {
      const settings = {
        baseUrl: normalizeBaseUrl(document.getElementById('redmineBaseUrl').value),
        apiKey: String(document.getElementById('redmineApiKey').value || '').trim(),
        target: document.getElementById('redmineTarget').value === 'authored' ? 'authored' : 'assigned',
        hideClosed: document.getElementById('redmineHideClosed').checked
      };
      saveRedmineSettings(settings.baseUrl, settings.apiKey, settings.target, settings.hideClosed);
      updateRedmineTickets();
    });

    document.getElementById('redmineReset').addEventListener('click', () => {
      localStorage.removeItem(REDMINE_BASE_URL_KEY);
      localStorage.removeItem(REDMINE_API_KEY);
      localStorage.removeItem(REDMINE_TARGET_KEY);
      localStorage.removeItem(REDMINE_HIDE_CLOSED_KEY);
      setRedmineForm({ baseUrl: '', apiKey: '', target: 'assigned', hideClosed: true });
      document.getElementById('redmineStatus').textContent = '設定をクリアしました。';
      document.getElementById('redmineSummary').textContent = '';
      document.getElementById('redmineList').textContent = '設定するとチケット一覧を表示します。';
    });

    updateClock();
    setInterval(updateClock, 1000);

    const redmineSettings = loadRedmineSettings();
    setRedmineForm(redmineSettings);
    if (redmineSettings.baseUrl && redmineSettings.apiKey) {
      updateRedmineTickets();
    }

    const savedZip = normalizeZip(localStorage.getItem(ZIP_STORAGE_KEY) || '');
    if (savedZip) {
      document.getElementById('zipInput').value = savedZip;
      applyZipSetting(savedZip);
    } else {
      updateWeatherTitle(currentLocation);
      updateWeather();
    }
    setInterval(updateWeather, 10 * 60 * 1000);
    setInterval(updateRedmineTickets, 5 * 60 * 1000);
    setInterval(() => location.reload(), 5 * 60 * 1000);
  </script>
</body>
</html>
